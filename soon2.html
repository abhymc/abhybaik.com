<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated; /* Menjaga agar elemen tetap tajam/pixelated */
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            color: #FFFFFF;
            overflow: hidden;
            
            /* Background Berpola Minecraft Dirt/Stone */
            background-color: #333;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* Pola tekstur kasar */
            background-size: 100px;
        }

        /* Bagian Atas - Judul */
        header {
            margin-top: 60px;
        }

        .judul {
            font-size: 2.5rem;
            color: #FF0000; /* Merah */
            text-shadow: 5px 5px 0px #500000;
            letter-spacing: 5px;
        }

        /* Bagian Tengah - Coming Soon */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .coming-soon {
            font-size: 3.5rem;
            color: #00AAFF; /* Biru Diamond */
            text-shadow: 6px 6px 0px #003366;
            animation: bounce 2s infinite ease-in-out;
        }

        /* Bagian Bawah - Tombol Menu */
        footer {
            margin-bottom: 80px;
        }

        .btn-minecraft {
            display: block;
            padding: 20px 40px;
            background-color: #8B8B8B;
            border: 4px solid #000;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1rem;
            position: relative;
            box-shadow: inset -4px -4px 0px #444, 
                        inset 4px 4px 0px #BBB;
            transition: all 0.1s;
        }

        .btn-minecraft:hover {
            background-color: #9B9B9B;
            color: #FFFF00; /* Kuning khas hover menu Minecraft */
            transform: translateY(-2px);
        }

        .btn-minecraft:active {
            transform: translateY(2px);
            box-shadow: inset 4px 4px 0px #444, 
                        inset -4px -4px 0px #BBB;
        }

        /* Efek Berdenyut Ringan */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); text-shadow: 8px 8px 0px #002244; }
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            .judul { font-size: 1.5rem; }
            .coming-soon { font-size: 1.8rem; }
            .btn-minecraft { font-size: 0.7rem; padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="judul"></h1>
    </header>

    <main>
        <div class="coming-soon">COMING SOON</div>
    </main>

    <footer>
        <a href="index.html" class="btn-minecraft">KEMBALI KE MENU UTAMA</a>
    </footer>

</body>
</html>
